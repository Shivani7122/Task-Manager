<!DOCTYPE html>
<html>

<head>

  <title>Dashboard</title>

  <link rel="stylesheet" href="style.css">

</head>

<body onload="initApp()">

<div class="app-wrapper">

  <!-- SIDEBAR -->

  <div class="sidebar">

    <h2>⚡ TaskApp</h2>

    <button onclick="showSection('dashboard')">
      Dashboard
    </button>

    <button onclick="showSection('projects')">
      Projects
    </button>

    <button onclick="showSection('tasks')">
      Tasks
    </button>

    <button onclick="showSection('users')">
      Users
    </button>

    <button onclick="logout()">
      Logout
    </button>

  </div>

  <!-- MAIN CONTENT -->

  <div class="main-content">

    <!-- DASHBOARD -->

    <div id="dashboardSection">

      <h2>Dashboard</h2>

      <div id="dashboard"></div>

    </div>

    <!-- PROJECT SECTION -->

    <div
      id="projectSection"
      style="display:none;"
    >

      <h2>Projects</h2>

      <!-- CREATE PROJECT -->

      <div id="createProjectBox">

        <input
          type="text"
          id="projectTitle"
          placeholder="Project title"
        >

        <textarea
          id="projectDescription"
          placeholder="Project description"
        ></textarea>

        <button onclick="createProject()">
          Create Project
        </button>

      </div>

      <!-- PROJECT LIST -->

      <div id="projectList"></div>

    </div>

    <!-- TASK SECTION -->

    <div
      id="taskSection"
      style="display:none;"
    >

      <!-- CREATE TASK -->

      <div id="createTaskBox">

        <h2>Create Task</h2>

        <input
          type="text"
          id="taskTitle"
          placeholder="Task title"
        >

        <textarea
          id="taskDescription"
          placeholder="Task description"
        ></textarea>

        <select id="projectSelect">

          <option value="">
            Select Project
          </option>

        </select>

        <select id="assignedUser">

          <option value="">
            Select User
          </option>

        </select>

        <input
          type="date"
          id="deadline"
        >

        <button onclick="createTask()">
          Create Task
        </button>

      </div>

      <!-- TASK LIST -->

      <h2>Tasks</h2>

      <div id="tasksDiv"></div>

    </div>

    <!-- USER SECTION -->

    <div
      id="userSection"
      style="display:none;"
    >

      <h2>Users</h2>

      <!-- CREATE USER -->

      <div id="createUserBox">

        <input
          type="text"
          id="newUsername"
          placeholder="Username"
        >

        <input
          type="password"
          id="newPassword"
          placeholder="Password"
        >

        <select id="newRole">

          <option value="MEMBER">
            MEMBER
          </option>

          <option value="ADMIN">
            ADMIN
          </option>

        </select>

        <button onclick="createUser()">
          Create User
        </button>

      </div>

      <!-- USER LIST -->

      <div id="usersList"></div>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>

</html>
