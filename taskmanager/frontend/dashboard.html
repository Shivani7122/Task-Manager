<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-wrapper">

  <div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
      <h2>⚡ TaskApp</h2>

      <button onclick="showSection('dashboard')">Dashboard</button>
      <button onclick="showSection('projects')">Projects</button>
      <button onclick="showSection('tasks')">Tasks</button>
      <button onclick="showSection('users')">Users</button>

      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>

    <!-- Main -->
    <div class="main">

      <!-- DASHBOARD -->
      <div id="dashboardSection" class="card">
        <h3>Dashboard</h3>
        <div id="dashboard" class="grid"></div>
      </div>

      <!-- PROJECT -->
      <div id="projectSection" class="card" style="display:none;">
        <h3>Create Project</h3>

        <div class="form-row">
          <input id="projectTitle" placeholder="Project title">
          <input id="projectDesc" placeholder="Description">
          <button onclick="createProject()">Create</button>
        </div>

        <h4>Projects</h4>
        <div id="projectList"></div>
      </div>

      <!-- TASK -->
      <div id="taskSection" class="card" style="display:none;">
        <h3>Create Task</h3>

        <div class="form-grid">
          <input id="taskTitle" placeholder="Title">
          <input id="taskDesc" placeholder="Description">

          <select id="status">
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>

          <select id="assignedUser"></select>
          <select id="projectSelect"></select>

          <input type="date" id="deadline">
        </div>

        <button onclick="createTask()">Create Task</button>

        <h3 style="margin-top:20px;">Tasks</h3>
        <div id="tasks"></div>
      </div>

      <!-- USERS -->
      <div id="userSection" class="card" style="display:none;">
        <h3>Users (Admin)</h3>

        <div class="form-grid">
          <input id="newUsername" placeholder="Username">
          <input id="newPassword" placeholder="Password">

          <select id="newRole">
            <option value="member">Member</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <!-- FIXED CHECKBOX ALIGNMENT -->
        <div class="checkbox-row">
          <label>
            <input type="checkbox" id="isSuperuser">
            Superuser
          </label>

          <label>
            <input type="checkbox" id="isActive" checked>
            Active
          </label>
        </div>

        <button onclick="createUser()">Add User</button>

        <h4 style="margin-top:20px;">User List</h4>
        <div id="usersList"></div>
      </div>

    </div>
  </div>
</div>

<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  initApp();
});
</script>

</body>
</html>
