<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-wrapper">

  <div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
      <h2>⚡ TaskApp</h2>
      <button onclick="showSection('dashboard')">Dashboard</button>
      <button onclick="showSection('projects')">Projects</button>
      <button onclick="showSection('tasks')">Tasks</button>
      <button onclick="showSection('users')">Users</button>
      <button onclick="logout()">Logout</button>
    </div>

    <!-- Main -->
    <div class="main">

      <!-- DASHBOARD -->
      <div id="dashboardSection" class="card">
        <h3>Dashboard</h3>
        <div id="dashboard" class="grid"></div>
      </div>

      <!-- PROJECT -->
      <div id="projectSection" class="card" style="display:none;">
        <h3>Create Project</h3>
        <input id="projectTitle" placeholder="Project title">
        <input id="projectDesc" placeholder="Description">
        <button onclick="createProject()">Create</button>

        <h4>Projects</h4>
        <div id="projectList"></div>
      </div>

      <!-- TASK -->
      <div id="taskSection" class="card" style="display:none;">
        <h3>Create Task</h3>

        <input id="taskTitle" placeholder="Title">
        <input id="taskDesc" placeholder="Description">

        <select id="status">
          <option value="pending">Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>

        <select id="assignedUser"></select>
        <select id="projectSelect"></select>

        <input type="date" id="deadline">

        <button onclick="createTask()">Create Task</button>

        <h3>Tasks</h3>
        <div id="tasks"></div>
      </div>

      <!-- USERS -->
      <div id="userSection" class="card" style="display:none;">
        <h3>Users (Admin)</h3>

        <input id="newUsername" placeholder="Username">
        <input id="newPassword" placeholder="Password">

        <select id="newRole">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>

        <label><input type="checkbox" id="isSuperuser"> Superuser</label>
        <label><input type="checkbox" id="isActive" checked> Active</label>

        <button onclick="createUser()">Add User</button>

        <div id="usersList"></div>
      </div>

    </div>
  </div>
</div>

<script src="script.js"></script>

<script>
  initApp();
</script>

</body>
</html>
