<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-wrapper">
  <div class="container">

    <!-- 🔥 SIDEBAR -->
    <div class="sidebar">
      <h2>⚡ TaskApp</h2>

      <button id="btnDashboard" onclick="showSection('dashboard')">📊 Dashboard</button>
      <button id="btnProjects" onclick="showSection('projects')">📁 Projects</button>
      <button id="btnTasks" onclick="showSection('tasks')">✅ Tasks</button>
      <button id="btnUsers" onclick="showSection('users')">👤 Users</button>

      <hr style="opacity:0.2; margin:15px 0;">

      <button onclick="logout()">🚪 Logout</button>
    </div>

    <!-- 🔥 MAIN -->
    <div class="main">

      <!-- 🔹 HEADER -->
      <div class="card">
        <h2 id="welcomeText">Welcome 👋</h2>
        <p style="opacity:0.7">Manage your tasks efficiently</p>
      </div>

      <!-- 🔹 DASHBOARD -->
      <div id="dashboardSection" class="card">
        <h3>📊 Dashboard Overview</h3>
        <div id="dashboard" class="grid">
          <div class="loader"></div>
        </div>
      </div>

      <!-- 🔹 PROJECT -->
      <div id="projectSection" class="card" style="display:none;">
        <h3>📁 Create Project</h3>

        <input id="projectTitle" placeholder="Project title">
        <input id="projectDesc" placeholder="Description">
        <select id="createdBySelect"></select>

        <button onclick="createProject()">➕ Create Project</button>

        <h4 style="margin-top:20px;">Project List</h4>
        <div id="projectList"></div>
      </div>

      <!-- 🔹 TASK -->
      <div id="taskSection" class="card" style="display:none;">
        <h3>✅ Create Task</h3>

        <input id="taskTitle" placeholder="Title">
        <input id="taskDesc" placeholder="Description">

        <select id="status">
          <option value="pending">Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>

        <select id="assignedUser"></select>
        <select id="projectSelect"></select>

        <input type="date" id="deadline">

        <button onclick="createTask()">➕ Create Task</button>

        <h3 style="margin-top:20px;">Task List</h3>
        <div id="tasksDiv"></div>
      </div>

      <!-- 🔹 USERS -->
      <div id="userSection" class="card" style="display:none;">
        <h3>👤 Manage Users</h3>

        <input id="newUsername" placeholder="Username">
        <input id="newPassword" placeholder="Password">

        <select id="newRole">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>

        <div class="checkbox-row">
          <label><input type="checkbox" id="isSuperuser"> Superuser</label>
          <label><input type="checkbox" id="isActive" checked> Active</label>
        </div>

        <button onclick="createUser()">➕ Add User</button>

        <h4 style="margin-top:20px;">User List</h4>
        <div id="usersList"></div>
      </div>

    </div>
  </div>
</div>

<script src="script.js"></script>

<script>
  initApp();

  // 🔥 Sidebar active highlight
  function setActive(btnId) {
    document.querySelectorAll(".sidebar button").forEach(b => b.classList.remove("active"));
    document.getElementById(btnId).classList.add("active");
  }

  function showSection(name) {
    dashboardSection.style.display = name === "dashboard" ? "block" : "none";
    projectSection.style.display = name === "projects" ? "block" : "none";
    taskSection.style.display = name === "tasks" ? "block" : "none";
    userSection.style.display = name === "users" ? "block" : "none";

    if (name === "dashboard") setActive("btnDashboard");
    if (name === "projects") setActive("btnProjects");
    if (name === "tasks") setActive("btnTasks");
    if (name === "users") setActive("btnUsers");
  }
</script>

</body>
</html>
